spring.application.name=parksmart

# Kết nối Database dùng biến môi trường của Railway
# Lưu ý: jdbc:mysql:// phía trước cực kỳ quan trọng
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Cấu hình Pool kết nối (HikariCP) để tránh lỗi timeout khi DB khởi động chậm
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Cấu hình Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# Cấu hình Giao diện (Thymeleaf)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# Cấu hình Server (Cổng chạy web)
# Railway sẽ cấp một cổng ngẫu nhiên thông qua biến PORT, mặc định là 8080 nếu chạy local
server.port=${PORT:8080}
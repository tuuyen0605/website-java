<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quản lý người dùng - Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Be Vietnam Pro', sans-serif; }
    body { background:#f5f5f5; }
    .app { min-height:100vh; display:flex; flex-direction:column; }

    .header { height:80px; background:#085CA7; display:flex; justify-content:space-between; align-items:center; padding:0 24px; color:white; position:sticky; top:0; z-index:100; }
    .header-left { display:flex; align-items:center; gap:12px; }
    .logo { width:55px; height:55px; border-radius:50%; overflow:hidden; }
    .logo img { width:100%; height:100%; object-fit:cover; }
    .school-info h1 { font-size:22px; font-weight:700; }
    .school-info p { font-size:14px; margin-top:4px; }
    .header-right { display:flex; align-items:center; gap:18px; }
    .avatar { width:48px; height:48px; background:white; border-radius:50%; border:2px solid #ddd; display:flex; align-items:center; justify-content:center; color:#085CA7; font-size:22px; cursor:pointer; position:relative; }
    .dropdown { display:none; position:absolute; top:56px; right:0; background:white; border-radius:10px; box-shadow:0 4px 20px rgba(0,0,0,0.15); min-width:200px; z-index:999; overflow:hidden; }
    .dropdown-name { padding:16px 20px; font-size:16px; font-weight:600; color:#333; border-bottom:1px solid #f0f0f0; }
    .dropdown-logout { display:flex; align-items:center; gap:10px; padding:12px 20px; font-size:15px; color:#C02727; text-decoration:none; }
    .dropdown-logout:hover { background:#fff0f0; }

    .main { display:flex; flex:1; }
    .sidebar { width:220px; background:white; border-right:1px solid #ddd; padding:16px; position:sticky; top:80px; height:calc(100vh - 80px); overflow-y:auto; }
    .menu-item { padding:12px 14px; margin-bottom:10px; border-radius:10px; font-size:16px; cursor:pointer; display:flex; align-items:center; gap:10px; text-decoration:none; color:#333; }
    .menu-item i { width:20px; }
    .menu-item:hover { background:#f0f0f0; }
    .menu-item.active { background:#ACBFDE80; color:#085CA7; font-weight:600; }

    .content { flex:1; padding:24px; }
    .page-title { font-size:24px; font-weight:700; color:#085CA7; margin-bottom:4px; }
    .page-subtitle { font-size:14px; color:#726E6E; margin-bottom:24px; }

    .table-wrap { background:white; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); overflow-x:auto; }
    table { width:100%; border-collapse:collapse; white-space:nowrap; }
    th { background:#085CA7; color:white; padding:14px 16px; font-size:13px; text-align:left; font-weight:600; }
    td { padding:12px 16px; font-size:13px; color:#333; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:#f9f9f9; }

    .badge-role { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; display:inline-block; }
    .badge-admin { background:#e8f0fe; color:#085CA7; }
    .badge-sv { background:#f0f0f0; color:#555; }

    .btn-role { padding:7px 16px; border-radius:20px; font-size:13px; font-weight:600; border:none; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
    .btn-cap { background:#e8f0fe; color:#085CA7; }
    .btn-ha { background:#fde8e8; color:#C02727; }

    .empty { text-align:center; padding:40px; color:#999; }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-left">
      <div class="logo">
        <img th:src="@{/images/logo-neu.png}" src="/images/logo-neu.png" alt="Logo NEU">
      </div>
      <div class="school-info">
        <h1>Đại học Kinh tế Quốc dân</h1>
        <p>Quản lý bãi xe thông minh - Admin</p>
      </div>
    </div>
    <div class="header-right">
      <div class="avatar" onclick="toggleDropdown()">
        <i class="fa-regular fa-user"></i>
        <div class="dropdown" id="userDropdown">
          <div class="dropdown-name" th:text="${user != null ? user.fullName : 'Admin'}">Admin</div>
          <a href="/logout" class="dropdown-logout">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Đăng xuất
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <a href="/admin/ve" class="menu-item">
        <i class="fa-solid fa-ticket"></i> Quản lý vé
      </a>
      <a href="/admin/bai-do" class="menu-item">
        <i class="fa-solid fa-location-dot"></i> Quản lý bãi đỗ
      </a>
      <a href="/admin/users" class="menu-item active">
        <i class="fa-solid fa-users"></i> Quản lý người dùng
      </a>
      <a href="/admin/thong-bao" class="menu-item">
        <i class="fa-solid fa-bullhorn"></i> Thông báo hệ thống
      </a>
      <a href="/admin/bao-cao" class="menu-item">
        <i class="fa-solid fa-triangle-exclamation"></i> Báo cáo sự cố
      </a>
    </div>

    <div class="content">
      <div class="page-title">Quản lý người dùng</div>
      <div class="page-subtitle">Cấp hoặc thu hồi quyền Admin</div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Họ tên</th>
              <th>Email</th>
              <th>Biển số xe</th>
              <th>Quyền hiện tại</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${userList == null or userList.isEmpty()}">
              <td colspan="5" class="empty">Chưa có người dùng nào</td>
            </tr>
            <tr th:each="u : ${userList}">
              <td th:text="${u.fullName}"></td>
              <td th:text="${u.email}"></td>
              <td th:text="${bienSoMap[u.id]}"></td>
              <td>
                <span class="badge-role badge-admin" th:if="${u.role == 'Admin'}">Admin</span>
                <span class="badge-role badge-sv" th:if="${u.role != 'Admin'}" th:text="${u.role}"></span>
              </td>
              <td>
                <button class="btn-role btn-ha" th:if="${u.role == 'Admin'}"
                        th:onclick="'doiRole(' + ${u.id} + ', \'Sinh viên\', this)'">
                  Admin
                </button>
                <button class="btn-role btn-cap" th:if="${u.role != 'Admin'}"
                        th:onclick="'doiRole(' + ${u.id} + ', \'Admin\', this)'">
                  Sinh viên
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  function doiRole(userId, role, btn) {
    if (!confirm(role === 'Admin' ? 'Cấp quyền Admin?' : 'Chuyển về Sinh viên?')) return;

    fetch('/api/admin/doi-role', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, role })
    })
    .then(res => res.json())
    .then(data => {
      if (data.status === 'success') {
        location.reload();
      } else {
        alert(data.message);
      }
    })
    .catch(() => alert('Lỗi kết nối server!'));
  }

  function toggleDropdown() {
    const d = document.getElementById('userDropdown');
    d.style.display = d.style.display === 'none' ? 'block' : 'none';
  }

  document.addEventListener('click', function(e) {
    const avatar = document.querySelector('.avatar');
    if (!avatar.contains(e.target)) document.getElementById('userDropdown').style.display = 'none';
  });
</script>
</body>
</html>

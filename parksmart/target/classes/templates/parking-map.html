<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vị trí bãi đỗ - Parksmart</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Be Vietnam Pro', sans-serif; }
    body { background:#f5f5f5; }
    .app { min-height:100vh; display:flex; flex-direction:column; }

    /* HEADER */
    .header { height:80px; background:#085CA7; display:flex; justify-content:space-between; align-items:center; padding:0 24px; color:white; position:sticky; top:0; z-index:100; }    
    .header-left { display:flex; align-items:center; gap:12px; }
    .logo { width:55px; height:55px; border-radius:50%; overflow:hidden; }
    .logo img { width:100%; height:100%; object-fit:cover; }
    .school-info h1 { font-size:22px; font-weight:700; }
    .school-info p { font-size:14px; margin-top:4px; }
    .header-right { display:flex; align-items:center; gap:18px; }
    .notification { position:relative; width:28px; height:28px; display:flex; align-items:center; justify-content:center; font-size:22px; color:white; }
    .badge { position:absolute; top:-4px; right:-4px; width:14px; height:14px; border-radius:50%; background:#C02727; color:white; font-size:10px; display:flex; justify-content:center; align-items:center; font-weight:bold; }
    .avatar { width:48px; height:48px; background:white; border-radius:50%; border:2px solid #ddd; display:flex; align-items:center; justify-content:center; color:#085CA7; font-size:22px; cursor:pointer; position:relative; }

    /* MAIN */
    .main { display:flex; flex:1; }

    /* SIDEBAR */
    .sidebar { width:220px; background:white; border-right:1px solid #ddd; padding:16px; position:sticky; top:80px; height:calc(100vh - 80px); overflow-y:auto; }    
    .menu-item { padding:12px 14px; margin-bottom:10px; border-radius:10px; font-size:16px; cursor:pointer; display:flex; align-items:center; gap:10px; text-decoration:none; color:#333; }
    .menu-item i { width:20px; }
    .menu-item:hover { background:#f0f0f0; }
    .menu-item.active { background:#ACBFDE80; color:#085CA7; font-weight:600; }

    /* CONTENT */
    .content { flex:1; padding:24px; }
    .page-title { font-size:24px; font-weight:700; color:#085CA7; margin-bottom:4px; }
    .page-header { position:sticky; top:80px; background:#f5f5f5; z-index:99; padding-bottom:16px; margin-bottom:8px; }
    .page-subtitle { font-size:14px; color:#726E6E; margin-bottom:24px; }

    /* PARKING CARD */
    .parking-card { background:white; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); padding:20px 24px; margin-bottom:16px; }
    .parking-card.tam-dong { opacity:0.7; }
    .parking-card.dong-cua { opacity:0.6; }
    .parking-top { display:flex; align-items:center; gap:14px; margin-bottom:8px; }
    .parking-name { font-size:18px; font-weight:700; color:#085CA7; }
    .status { padding:5px 14px; border-radius:20px; font-size:13px; font-weight:600; }
    .status-mo { background:#dff5e4; color:#336D46; }
    .status-it { background:#FFF3CD; color:#856404; }
    .status-tam { background:#fde8e8; color:#C02727; }
    .status-dong { background:#f0f0f0; color:#666; }
    .parking-location { color:#666; font-size:15px; }
    .banner-canh-bao { background:#FFF8E1; border-left:3px solid #F8B13F; border-radius:8px; padding:12px 16px; margin-bottom:16px; font-size:14px; color:#5D4037; display:none; }
    .banner-canh-bao i { color:#F8B13F; margin-right:8px; }
    .parking-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.12); transform:translateY(-1px); transition:all 0.2s; }

    /* DROPDOWN */
    .dropdown { display:none; position:absolute; top:56px; right:0; background:white; border-radius:10px; box-shadow:0 4px 20px rgba(0,0,0,0.15); min-width:200px; z-index:999; overflow:hidden; }
    .dropdown-name { padding:16px 20px; font-size:16px; font-weight:600; color:#333; border-bottom:1px solid #f0f0f0; }
    .dropdown-logout { display:flex; align-items:center; gap:10px; padding:12px 20px; font-size:15px; color:#C02727; text-decoration:none; }
    .dropdown-logout:hover { background:#fff0f0; }

    @media(max-width:768px) {
      .main { flex-direction:column; }
      .sidebar { width:100%; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="logo">
        <img th:src="@{/images/logo-neu.png}" src="/images/logo-neu.png" alt="Logo NEU">
      </div>
      <div class="school-info">
        <h1>Đại học Kinh tế Quốc dân</h1>
        <p>Quản lý bãi xe thông minh</p>
      </div>
    </div>
    <div class="header-right">
      <div class="notification">
        <i class="fa-regular fa-bell"></i>
        <div class="badge">1</div>
      </div>
      <div class="avatar" onclick="toggleDropdown()">
        <i class="fa-regular fa-user"></i>
        <div class="dropdown" id="userDropdown">
          <div class="dropdown-name" th:text="${user != null ? user.fullName : 'Người dùng'}">Nguyễn Văn A</div>
          <a href="/logout" class="dropdown-logout">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Đăng xuất
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <a href="/homepage" class="menu-item"><i class="fa-solid fa-chart-line"></i> Tổng quan</a>
      <a href="/vi-tri-bai-do" class="menu-item active"><i class="fa-solid fa-location-dot"></i> Vị trí bãi đỗ</a>
      <a href="/dang-ky-ve" class="menu-item"><i class="fa-solid fa-ticket"></i> Đăng ký vé</a>
      <a href="/ve-cua-toi" class="menu-item"><i class="fa-solid fa-receipt"></i> Vé của tôi</a>
      <a href="/bao-cao-su-co" class="menu-item"><i class="fa-solid fa-triangle-exclamation"></i> Báo cáo sự cố</a>

    </div>

    <!-- CONTENT -->
    <div class="content">
      <div class="page-title">Vị trí bãi đỗ</div>
      <div class="page-subtitle">Theo dõi vị trí của các bãi xe</div>

      <!-- BANNER CẢNH BÁO KHI CÓ BÃI TẠM ĐÓNG -->
      <div class="banner-canh-bao" id="bannerCanhBao">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span id="bannerText"></span>
      </div>

      <!-- DANH SÁCH BÃI ĐỖ ĐỘNG -->
      <div th:each="baiDo : ${baiDoList}"
           th:class="'parking-card ' + (${baiDo.trangThai == 'Tạm đóng'} ? 'tam-dong' : (${baiDo.trangThai == 'Đóng cửa'} ? 'dong-cua' : ''))"
           th:onclick="'window.location.href=\'/bai-do/' + ${baiDo.id} + '\''"
           style="cursor:pointer;">
        <div class="parking-top">
          <div class="parking-name" th:text="${baiDo.ten}"></div>
          <div th:class="'status ' + (${baiDo.trangThai == 'Mở cửa'} ? 'status-mo' : (${baiDo.trangThai == 'Còn ít chỗ'} ? 'status-it' : (${baiDo.trangThai == 'Tạm đóng'} ? 'status-tam' : 'status-dong')))"
               th:text="${baiDo.trangThai}"></div>
          <span style="font-size:14px; color:#555;" th:if="${baiDo.trangThai != 'Tạm đóng' and baiDo.trangThai != 'Đóng cửa'}">
            <span th:text="${baiDo.gioMo + ' - ' + baiDo.gioDong}"></span>
          </span>
        </div>
        <div class="parking-location">
          <i class="fa-solid fa-location-dot" style="color:#085CA7; margin-right:6px;"></i>
          Địa điểm: <span th:text="${baiDo.diaChi}"></span>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  function toggleDropdown() {
    const d = document.getElementById('userDropdown');
    d.style.display = d.style.display === 'none' ? 'block' : 'none';
  }

  document.addEventListener('click', function(e) {
    const avatar = document.querySelector('.avatar');
    if (!avatar.contains(e.target)) {
      document.getElementById('userDropdown').style.display = 'none';
    }
  });
</script>
</body>
</html>

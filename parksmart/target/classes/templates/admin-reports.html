<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quản lý báo cáo - Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Be Vietnam Pro', sans-serif; }
    body { background:#f5f5f5; }
    .app { min-height:100vh; display:flex; flex-direction:column; }

    .header { height:80px; background:#085CA7; display:flex; justify-content:space-between; align-items:center; padding:0 24px; color:white; position:sticky; top:0; z-index:100; }
    .header-left { display:flex; align-items:center; gap:12px; }
    .logo { width:55px; height:55px; border-radius:50%; overflow:hidden; }
    .logo img { width:100%; height:100%; object-fit:cover; }
    .school-info h1 { font-size:22px; font-weight:700; }
    .school-info p { font-size:14px; margin-top:4px; }
    .header-right { display:flex; align-items:center; gap:18px; }
    .avatar { width:48px; height:48px; background:white; border-radius:50%; border:2px solid #ddd; display:flex; align-items:center; justify-content:center; color:#085CA7; font-size:22px; cursor:pointer; position:relative; }
    .dropdown { display:none; position:absolute; top:56px; right:0; background:white; border-radius:10px; box-shadow:0 4px 20px rgba(0,0,0,0.15); min-width:200px; z-index:999; overflow:hidden; }
    .dropdown-name { padding:16px 20px; font-size:16px; font-weight:600; color:#333; border-bottom:1px solid #f0f0f0; }
    .dropdown-logout { display:flex; align-items:center; gap:10px; padding:12px 20px; font-size:15px; color:#C02727; text-decoration:none; }
    .dropdown-logout:hover { background:#fff0f0; }

    .main { display:flex; flex:1; }
    .sidebar { width:220px; background:white; border-right:1px solid #ddd; padding:16px; position:sticky; top:80px; height:calc(100vh - 80px); overflow-y:auto; }
    .menu-item { padding:12px 14px; margin-bottom:10px; border-radius:10px; font-size:16px; cursor:pointer; display:flex; align-items:center; gap:10px; text-decoration:none; color:#333; }
    .menu-item i { width:20px; }
    .menu-item:hover { background:#f0f0f0; }
    .menu-item.active { background:#ACBFDE80; color:#085CA7; font-weight:600; }

    .content { flex:1; padding:24px; }
    .page-title { font-size:24px; font-weight:700; color:#085CA7; margin-bottom:4px; }
    .page-subtitle { font-size:14px; color:#726E6E; margin-bottom:24px; }

    /* REPORT CARD */
    .report-card { background:white; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); padding:20px 24px; margin-bottom:16px; }
    .report-top { display:flex; align-items:center; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
    .report-user { font-size:15px; font-weight:700; color:#085CA7; }
    .report-date { font-size:13px; color:#999; margin-left:auto; }
    .badge-status { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; }
    .badge-cho { background:#FFF3CD; color:#856404; }
    .badge-dang { background:#e8f0fe; color:#085CA7; }
    .badge-xong { background:#dff5e4; color:#336D46; }

    .report-body { margin-bottom:12px; }
    .report-mo-ta { font-size:14px; color:#333; margin-bottom:8px; line-height:1.6; }
    .report-meta { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:8px; }
    .report-meta-item { font-size:13px; color:#666; display:flex; align-items:center; gap:6px; }
    .report-meta-item i { color:#085CA7; }
    .report-anh { margin-top:8px; }
    .report-anh img { max-width:200px; max-height:150px; border-radius:8px; object-fit:cover; cursor:pointer; }

    /* TRA CỨU BIỂN SỐ */
    .tracuu-wrap { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .tracuu-input { padding:8px 12px; border:1.5px solid #e0e0e0; border-radius:8px; font-size:13px; outline:none; font-family:'Be Vietnam Pro', sans-serif; width:160px; }
    .tracuu-input:focus { border-color:#085CA7; }
    .tracuu-btn { padding:8px 14px; background:#085CA7; color:white; border:none; border-radius:8px; font-size:13px; cursor:pointer; }
    .tracuu-result { font-size:13px; margin-top:6px; padding:8px 12px; border-radius:8px; display:none; }
    .tracuu-result.found { background:#dff5e4; color:#336D46; }
    .tracuu-result.notfound { background:#fde8e8; color:#C02727; }

    /* CẬP NHẬT TRẠNG THÁI */
    .update-wrap { display:flex; align-items:flex-start; gap:8px; flex-wrap:wrap; }
    .status-select { padding:8px 12px; border:1.5px solid #e0e0e0; border-radius:8px; font-size:13px; outline:none; font-family:'Be Vietnam Pro', sans-serif; }
    .ghi-chu-input { padding:8px 12px; border:1.5px solid #e0e0e0; border-radius:8px; font-size:13px; outline:none; font-family:'Be Vietnam Pro', sans-serif; width:200px; }
    .update-btn { padding:8px 14px; background:#085CA7; color:white; border:none; border-radius:8px; font-size:13px; cursor:pointer; }

    .empty { text-align:center; padding:40px; color:#999; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="logo"><img th:src="@{/images/logo-neu.png}" src="/images/logo-neu.png" alt="Logo NEU"></div>
      <div class="school-info">
        <h1>Đại học Kinh tế Quốc dân</h1>
        <p>Quản lý bãi xe thông minh - Admin</p>
      </div>
    </div>
    <div class="header-right">
      <div class="avatar" onclick="toggleDropdown()">
        <i class="fa-regular fa-user"></i>
        <div class="dropdown" id="userDropdown">
          <div class="dropdown-name" th:text="${user != null ? user.fullName : 'Admin'}">Admin</div>
          <a href="/logout" class="dropdown-logout"><i class="fa-solid fa-arrow-right-from-bracket"></i> Đăng xuất</a>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <a href="/admin/ve" class="menu-item"><i class="fa-solid fa-ticket"></i> Quản lý vé</a>
      <a href="/admin/bai-do" class="menu-item"><i class="fa-solid fa-location-dot"></i> Quản lý bãi đỗ</a>
      <a href="/admin/users" class="menu-item"><i class="fa-solid fa-users"></i> Quản lý người dùng</a>
            <a href="/admin/thong-bao" class="menu-item">
        <i class="fa-solid fa-bullhorn"></i> Thông báo hệ thống
      </a>
      <a href="/admin/bao-cao" class="menu-item active"><i class="fa-solid fa-triangle-exclamation"></i> Báo cáo sự cố</a>
    </div>

    <div class="content">
      <div class="page-title">Báo cáo sự cố</div>
      <div class="page-subtitle">Xem và xử lý các báo cáo từ sinh viên</div>

      <div th:if="${danhSachBaoCao == null or danhSachBaoCao.isEmpty()}" class="empty">
        Chưa có báo cáo nào
      </div>

      <div th:each="bc : ${danhSachBaoCao}" class="report-card">
        <div class="report-top">
          <div class="report-user" th:text="${bc.user.fullName}"></div>
          <span style="font-size:13px; color:#666;" th:text="${bc.user.email}"></span>
          <span class="badge-status badge-cho" th:if="${bc.trangThai == 'Chờ xử lý'}" th:text="${bc.trangThai}"></span>
          <span class="badge-status badge-dang" th:if="${bc.trangThai == 'Đang xử lý'}" th:text="${bc.trangThai}"></span>
          <span class="badge-status badge-xong" th:if="${bc.trangThai == 'Đã giải quyết'}" th:text="${bc.trangThai}"></span>
          <span class="report-date" th:text="${#temporals.format(bc.ngayTao, 'dd/MM/yyyy HH:mm')}"></span>
        </div>

        <div class="report-body">
          <div class="report-mo-ta" th:text="${bc.moTa}"></div>
          <div class="report-meta">
            <div class="report-meta-item" th:if="${bc.bienSoNghi != null and !bc.bienSoNghi.isEmpty()}">
              <i class="fa-solid fa-car"></i> Biển số nghi: <strong th:text="${bc.bienSoNghi}"></strong>
            </div>
            <div class="report-meta-item" th:if="${bc.khuVuc != null and !bc.khuVuc.isEmpty()}">
              <i class="fa-solid fa-location-dot"></i> <span th:text="${bc.khuVuc}"></span>
            </div>
          </div>
          <div class="report-anh" th:if="${bc.anhUrl != null}">
            <img th:src="${bc.anhUrl}" alt="Ảnh bằng chứng" onclick="window.open(this.src)">
          </div>
        </div>

        <!-- TRA CỨU BIỂN SỐ -->
        <div th:if="${bc.bienSoNghi != null and !bc.bienSoNghi.isEmpty()}" style="margin-bottom:12px;">
          <div style="font-size:13px; font-weight:600; color:#555; margin-bottom:6px;">Tra cứu chủ xe:</div>
          <div class="tracuu-wrap">
            <input class="tracuu-input" type="text" th:value="${bc.bienSoNghi}" th:id="'tracuu-' + ${bc.id}">
            <button class="tracuu-btn" th:onclick="'traCuu(' + ${bc.id} + ')'">Tra cứu</button>
          </div>
          <div class="tracuu-result" th:id="'result-' + ${bc.id}"></div>
        </div>

        <!-- CẬP NHẬT TRẠNG THÁI -->
        <div>
          <div style="font-size:13px; font-weight:600; color:#555; margin-bottom:6px;">Cập nhật trạng thái:</div>
          <div class="update-wrap">
            <select class="status-select" th:id="'status-' + ${bc.id}">
              <option th:selected="${bc.trangThai == 'Chờ xử lý'}">Chờ xử lý</option>
              <option th:selected="${bc.trangThai == 'Đang xử lý'}">Đang xử lý</option>
              <option th:selected="${bc.trangThai == 'Đã giải quyết'}">Đã giải quyết</option>
            </select>
            <input class="ghi-chu-input" type="text" th:id="'ghichu-' + ${bc.id}"
                   th:value="${bc.ghiChuAdmin}" placeholder="Ghi chú cho sinh viên...">
            <button class="update-btn" th:onclick="'capNhat(' + ${bc.id} + ')'">Lưu</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function traCuu(id) {
    const bienSo = document.getElementById('tracuu-' + id).value.trim();
    const resultEl = document.getElementById('result-' + id);
    if (!bienSo) return;

    fetch('/api/admin/tra-cuu-bien-so?bienSo=' + encodeURIComponent(bienSo))
      .then(res => res.json())
      .then(data => {
        resultEl.style.display = 'block';
        if (data.status === 'success') {
          resultEl.className = 'tracuu-result found';
          resultEl.innerHTML = '<i class="fa-solid fa-circle-check"></i> Chủ xe: <strong>' + data.hoTen + '</strong> — ' + data.email;
        } else {
          resultEl.className = 'tracuu-result notfound';
          resultEl.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> ' + data.message;
        }
      });
  }

  function capNhat(id) {
    const trangThai = document.getElementById('status-' + id).value;
    const ghiChu = document.getElementById('ghichu-' + id).value;

    fetch('/api/admin/cap-nhat-bao-cao', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, trangThai, ghiChu })
    })
    .then(res => res.json())
    .then(data => {
      if (data.status === 'success') {
        alert('Cập nhật thành công!');
        location.reload();
      } else {
        alert(data.message);
      }
    });
  }

  function toggleDropdown() {
    const d = document.getElementById('userDropdown');
    d.style.display = d.style.display === 'none' ? 'block' : 'none';
  }

  document.addEventListener('click', function(e) {
    const avatar = document.querySelector('.avatar');
    if (!avatar.contains(e.target)) document.getElementById('userDropdown').style.display = 'none';
  });
</script>
</body>
</html>
